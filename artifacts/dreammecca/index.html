<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ============================================================
         PRIMARY SEO
    ============================================================ -->
    <title>Dreammecca Tour &amp; Travel — Paket Umroh Terpercaya, Nyaman &amp; Berkah</title>
    <meta name="description" content="Dreammecca Tour &amp; Travel, agen perjalanan Umroh terpercaya di Jakarta Selatan. Terdaftar resmi Kemenag RI (PPIU No. U.620/2023). Paket Umroh premium: hotel bintang 4-5, Saudia Airlines &amp; Garuda Indonesia, pembimbing ibadah berpengalaman. Konsultasi gratis!" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Dreammecca Tour &amp; Travel" />
    <meta name="keywords" content="paket umroh, umroh terpercaya, agen umroh jakarta, umroh 2026, umroh ramadan, umroh murah, umroh premium, dreammecca" />
    <link rel="canonical" href="https://www.dreammecca.co.id/" />

    <!-- ============================================================
         OPEN GRAPH (Facebook, Instagram, WhatsApp)
         Ganti og:image dengan URL domain Anda setelah deploy
    ============================================================ -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="Dreammecca Tour &amp; Travel" />
    <meta property="og:title"       content="Dreammecca — Paket Umroh Terpercaya &amp; Berkah" />
    <meta property="og:description" content="Perjalanan Umroh nyaman dan bermakna. Hotel bintang 4-5, penerbangan Saudia &amp; Garuda, pembimbing berpengalaman. Terdaftar resmi Kemenag RI. Konsultasi gratis!" />
    <meta property="og:url"         content="https://www.dreammecca.co.id/" />
    <meta property="og:locale"      content="id_ID" />
    <!-- Ganti nilai di bawah dengan URL absolut setelah deploy, contoh:
         https://www.dreammecca.co.id/images/og-image.jpg
         Buat file og-image.jpg: 1200×630px, lihat README.txt untuk panduan -->
    <meta property="og:image"       content="/images/og-image.jpg" />
    <meta property="og:image:alt"   content="Dreammecca Tour &amp; Travel — Paket Umroh Terpercaya" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- ============================================================
         TWITTER / X CARD
    ============================================================ -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@dreammecca" />
    <meta name="twitter:title"       content="Dreammecca — Paket Umroh Terpercaya &amp; Berkah" />
    <meta name="twitter:description" content="Perjalanan Umroh nyaman dan bermakna. Hotel bintang 4-5, penerbangan Saudia &amp; Garuda, pembimbing berpengalaman. Konsultasi gratis!" />
    <meta name="twitter:image"       content="/images/og-image.jpg" />
    <meta name="twitter:image:alt"   content="Dreammecca Tour &amp; Travel" />

    <!-- ============================================================
         STRUCTURED DATA (Google Rich Results)
    ============================================================ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "TravelAgency",
      "name": "Dreammecca Tour & Travel",
      "description": "Agen perjalanan Umroh terpercaya di Jakarta Selatan, terdaftar resmi Kemenag RI",
      "url": "https://www.dreammecca.co.id/",
      "telephone": "+6281234567890",
      "email": "info@dreammecca.co.id",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Jl. Kemang Raya No. 45",
        "addressLocality": "Jakarta Selatan",
        "addressRegion": "DKI Jakarta",
        "postalCode": "12730",
        "addressCountry": "ID"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": -6.261,
        "longitude": 106.813
      },
      "openingHoursSpecification": [
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday"],
          "opens": "08:00",
          "closes": "17:00"
        },
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": "Saturday",
          "opens": "09:00",
          "closes": "14:00"
        }
      ],
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "reviewCount": "5000",
        "bestRating": "5"
      },
      "sameAs": [
        "https://www.instagram.com/dreammecca",
        "https://www.facebook.com/dreammecca"
      ]
    }
    </script>

    <!-- ============================================================
         FAVICON & ICONS
    ============================================================ -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- ============================================================
         GOOGLE FONTS — preconnect first, then load both fonts
         via single <link> to minimise round-trips
    ============================================================ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
