openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: Packages
    description: Umroh package listing and management.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          description: Relative path to redirect to after login (must start with `/`). Defaults to `/`.
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to the `returnTo` path on success (defaults to `/`) or `/api/login` on failure.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'
  /packages:
    get:
      tags: [Packages]
      operationId: listPublicPackages
      summary: List active packages with their active departures
      responses:
        '200':
          description: List of active packages.
          content:
            application/json:
              schema:
                type: object
                required: [packages]
                properties:
                  packages:
                    type: array
                    items:
                      $ref: '#/components/schemas/Package'
  /admin/packages:
    get:
      tags: [Packages]
      operationId: listAdminPackages
      summary: List all packages (admin only)
      responses:
        '200':
          description: List of all packages.
          content:
            application/json:
              schema:
                type: object
                required: [packages]
                properties:
                  packages:
                    type: array
                    items:
                      $ref: '#/components/schemas/Package'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    post:
      tags: [Packages]
      operationId: createPackage
      summary: Create a new package (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PackageInput'
      responses:
        '201':
          description: Package created.
          content:
            application/json:
              schema:
                type: object
                required: [package]
                properties:
                  package:
                    $ref: '#/components/schemas/Package'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /admin/packages/{id}:
    put:
      tags: [Packages]
      operationId: updatePackage
      summary: Update a package (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PackageInput'
      responses:
        '200':
          description: Package updated.
          content:
            application/json:
              schema:
                type: object
                required: [package]
                properties:
                  package:
                    $ref: '#/components/schemas/Package'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Package not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    delete:
      tags: [Packages]
      operationId: deletePackage
      summary: Delete a package (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Package deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /admin/packages/{packageId}/departures:
    post:
      tags: [Packages]
      operationId: createDeparture
      summary: Add a departure date to a package (admin only)
      parameters:
        - name: packageId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DepartureInput'
      responses:
        '201':
          description: Departure created.
          content:
            application/json:
              schema:
                type: object
                required: [departure]
                properties:
                  departure:
                    $ref: '#/components/schemas/Departure'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /admin/departures/{id}:
    put:
      tags: [Packages]
      operationId: updateDeparture
      summary: Update a departure (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DepartureInput'
      responses:
        '200':
          description: Departure updated.
          content:
            application/json:
              schema:
                type: object
                required: [departure]
                properties:
                  departure:
                    $ref: '#/components/schemas/Departure'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    delete:
      tags: [Packages]
      operationId: deleteDeparture
      summary: Delete a departure (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Departure deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
    Departure:
      type: object
      required: [id, packageId, dateLabel, quotaLabel, isActive, sortOrder]
      properties:
        id:
          type: string
        packageId:
          type: string
        dateLabel:
          type: string
        quotaLabel:
          type: string
        isActive:
          type: boolean
        sortOrder:
          type: integer
    DepartureInput:
      type: object
      required: [dateLabel]
      properties:
        dateLabel:
          type: string
          minLength: 1
        quotaLabel:
          type: string
        isActive:
          type: boolean
        sortOrder:
          type: integer
    Package:
      type: object
      required:
        - id
        - slug
        - tier
        - duration
        - title
        - hotelMecca
        - hotelMadinah
        - flightType
        - landing
        - tags
        - priceFrom
        - posterUrl
        - featured
        - isActive
        - sortOrder
        - departures
      properties:
        id:
          type: string
        slug:
          type: string
        tier:
          type: string
          enum: [Reguler, Luxury]
        duration:
          type: string
        title:
          type: string
        hotelMecca:
          type: string
        hotelMadinah:
          type: string
        flightType:
          type: string
        landing:
          type: string
        tags:
          type: array
          items:
            type: string
        priceFrom:
          type: integer
        posterUrl:
          type: [string, 'null']
        featured:
          type: boolean
        isActive:
          type: boolean
        sortOrder:
          type: integer
        departures:
          type: array
          items:
            $ref: '#/components/schemas/Departure'
    PackageInput:
      type: object
      required:
        - slug
        - tier
        - duration
        - title
        - hotelMecca
        - hotelMadinah
        - priceFrom
      properties:
        slug:
          type: string
          minLength: 1
        tier:
          type: string
          enum: [Reguler, Luxury]
        duration:
          type: string
          minLength: 1
        title:
          type: string
          minLength: 1
        hotelMecca:
          type: string
          minLength: 1
        hotelMadinah:
          type: string
          minLength: 1
        flightType:
          type: string
        landing:
          type: string
        tags:
          type: array
          items:
            type: string
        priceFrom:
          type: integer
        posterUrl:
          type: [string, 'null']
        featured:
          type: boolean
        isActive:
          type: boolean
        sortOrder:
          type: integer
