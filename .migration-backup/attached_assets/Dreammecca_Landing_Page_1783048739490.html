document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ss=\"faqitem\"><button class=\"faqq\" onclick=\"{{ f.onToggle }}\">{{ f.q }}<span class=\"{{ f.plusClass }}\">+<\u002Fspan><\u002Fbutton><div class=\"{{ f.answerClass }}\"><p>{{ f.a }}<\u002Fp><\u002Fdiv><\u002Fdiv><\u002Fsc-for><\u002Fdiv>\n<\u002Fdiv><\u002Fsection>\n<section class=\"sec sec-navy2\" id=\"kontak\"><div class=\"wrap ctagrid\">\n<div><span class=\"eyebrow\">Konsultasi Gratis<\u002Fspan><h2 class=\"h2\">Siap Berangkat? Tim Kami Siap Membantu<\u002Fh2><p class=\"lead\">Konsultasikan kebutuhan Umroh Anda tanpa biaya — kami bantu pilih jadwal, kamar, dan cara pembayaran yang sesuai.<\u002Fp>\n<div class=\"herocta\" style=\"margin-top:28px\"><a class=\"btn btn-primary\" href=\"{{ waLink }}\" target=\"_blank\" rel=\"noopener\">Chat via WhatsApp<\u002Fa><\u002Fdiv>\n<div class=\"contactrow\"><div class=\"contactitem\"><div><h3>Alamat Kantor<\u002Fh3><p>Jl. Durian Raya, Jagakarsa,<br>Jakarta Selatan, DKI Jakarta<\u002Fp><\u002Fdiv><\u002Fdiv><div class=\"contactitem\"><div><h3>Email<\u002Fh3><p>dreammecca@gmail.com<\u002Fp><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<div class=\"ph mapph\"><span class=\"ph-label\">Embed Google Maps — lokasi kantor Jagakarsa<\u002Fspan><\u002Fdiv>\n<\u002Fdiv><\u002Fsection>\n<footer><div class=\"footwrap\"><div><div class=\"logo\">Dreammecca<\u002Fdiv><p class=\"foottext\">Dreammecca Tour &amp; Travel — penyelenggara ibadah Umroh resmi berizin Kementerian Agama RI, berbasis di Jakarta Selatan.<\u002Fp><\u002Fdiv><a class=\"btn btn-outline\" href=\"{{ waLink }}\" target=\"_blank\" rel=\"noopener\">Konsultasi Gratis<\u002Fa><\u002Fdiv><div class=\"footbottom\"><span>© 2026 Dreammecca Tour &amp; Travel. All rights reserved.<\u002Fspan><span>dreammecca@gmail.com<\u002Fspan><\u002Fdiv><\u002Ffooter>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    selectedRoom: {},\n    openFaq: 0\n  };\n  fmtPrice(n) {\n    const juta = n / 1000000;\n    const s = juta.toFixed(1).replace('.', ',');\n    return 'Rp ' + s + ' Juta';\n  }\n  selectRoom(pkgId, type) {\n    this.setState(s => ({ selectedRoom: { ...s.selectedRoom, [pkgId]: type } }));\n  }\n  toggleFaq(i) {\n    this.setState(s => ({ openFaq: s.openFaq === i ? -1 : i }));\n  }\n  renderVals() {\n    const waLink = 'https://wa.me/6281234567890?text=' + encodeURIComponent('Assalamualaikum, saya ingin konsultasi paket Umroh Dreammecca');\n    const rawPackages = [\n      { id: 1, badge: 'Best Seller', name: 'Umroh Reguler 9 Hari', period: 'Keberangkatan September 2026 · Free Thoif', airline: 'Direct Saudia Airlines', hotelMakkah: 'Emaar Al Maqam ★4', hotelMadinah: 'Golden Tulip Al Ansar ★4', perksLabel: 'Manasik 3x, perlengkapan lengkap', quota: 'Sisa 6 kursi dari 45 kuota', featured: true,\n        rooms: [ { type: 'Quad', label: 'Quad Room (isi 4)', price: 33900000 }, { type: 'Triple', label: 'Triple Room (isi 3)', price: 35900000 }, { type: 'Double', label: 'Double Room (isi 2)', price: 39900000 } ] },\n      { id: 2, badge: 'Reguler', name: 'Umroh Reguler 12 Hari', period: 'Keberangkatan Oktober 2026 · Plus Thaif', airline: 'Direct Garuda Indonesia', hotelMakkah: 'Elaf Al Mashaer ★4', hotelMadinah: 'Dar Al Taqwa ★4', perksLabel: 'Manasik 3x, city tour Thaif', quota: 'Sisa 12 kursi dari 45 kuota', featured: false,\n        rooms: [ { type: 'Quad', label: 'Quad Room (isi 4)', price: 36900000 }, { type: 'Triple', label: 'Triple Room (isi 3)', price: 38900000 }, { type: 'Double', label: 'Double Room (isi 2)', price: 42900000 } ] },\n      { id: 3, badge: 'Premium', name: 'Umroh Premium 9 Hari', period: 'Keberangkatan November 2026 · Hotel Bintang 5', airline: 'Direct Saudia Airlines', hotelMakkah: 'Swissotel Al Maqam ★5', hotelMadinah: 'Pullman Zamzam ★5', perksLabel: 'Kamar view Ka\\'bah, koper premium', quota: 'Sisa 9 kursi dari 30 kuota', featured: false,\n        rooms: [ { type: 'Quad', label: 'Quad Room (isi 4)', price: 45900000 }, { type: 'Triple', label: 'Triple Room (isi 3)', price: 48900000 }, { type: 'Double', label: 'Double Room (isi 2)', price: 54900000 } ] }\n    ];\n    const displayPackages = rawPackages.map(p => {\n      const sel = this.state.selectedRoom[p.id] || p.rooms[0].type;\n      const active = p.rooms.find(r => r.type === sel) || p.rooms[0];\n      const roomsWithMeta = p.rooms.map(r => ({\n        type: r.type,\n        btnClass: 'roombtn' + (r.type === sel ? ' active' : ''),\n        onClick: () => this.selectRoom(p.id, r.type)\n      }));\n      return {\n        ...p,\n        cardClass: 'pkgcard' + (p.featured ? ' feat' : ''),\n        roomsWithMeta,\n        activePriceLabel: this.fmtPrice(active.price),\n        activeRoomLabel: active.label\n      };\n    });\n    const facilities = [\n      { title: 'Penyelenggara Resmi Ibadah Umroh', desc: 'Berizin resmi PPIU dari Kementerian Agama RI, terdaftar dan diawasi.' },\n      { title: 'Maskapai Internasional', desc: 'Penerbangan langsung setaraf internasional, tanpa transit panjang.' },\n      { title: 'Hotel Bintang 4 Terbaik', desc: 'Jarak dekat Masjidil Haram & Masjid Nabawi, fasilitas nyaman.' },\n      { title: 'Transportasi Bus Terbaru', desc: 'Armada bus ber-AC untuk seluruh rangkaian perjalanan ibadah.' },\n      { title: 'Manasik Eksklusif', desc: 'Pembekalan manasik intensif sebelum keberangkatan.' },\n      { title: 'Perlengkapan Eksklusif', desc: 'Perlengkapan Umroh terlengkap dan berkualitas untuk tiap jamaah.' },\n      { title: 'Ruang Tunggu Nyaman', desc: 'Fasilitas keberangkatan & kepulangan di bandara Indonesia.' },\n      { title: 'Full Bimbingan', desc: 'Didampingi pembimbing bersertifikat, sesuai sunnah Nabi ﷺ.' }\n    ];\n    const gallery = [\n      { name: 'Koper & Tas Umroh' }, { name: 'Mukena & Ihram' }, { name: 'Sajadah Travel' },\n      { name: 'Buku Doa & Manasik' }, { name: 'Seragam Kloter' }, { name: 'Kit Kesehatan' }\n    ];\n    const testimonials = [\n      { initials: 'RH', name: 'Ratna Hidayati', meta: 'Kloter September 2025', quote: 'Pelayanan sangat rapi dari awal daftar sampai pulang. Hotel dekat sekali dengan Masjidil Haram, sesuai janji.' },\n      { initials: 'AF', name: 'Ahmad Fauzan', meta: 'Kloter Mei 2025', quote: 'Pembimbingnya sabar dan jelas, manasiknya benar-benar membantu terutama untuk jamaah lansia seperti orang tua saya.' },\n      { initials: 'SN', name: 'Siti Nuraini', meta: 'Kloter Januari 2025', quote: 'Awalnya was-was karena banyak berita penipuan travel Umroh, tapi Dreammecca transparan soal izin dan itinerary sejak awal.' }\n    ];\n    const legalPoints = [\n      { title: 'Izin PPIU Kemenag RI', desc: 'Terdaftar resmi sebagai Penyelenggara Perjalanan Ibadah Umroh — nomor izin dapat diverifikasi di Kementerian Agama.' },\n      { title: 'Anggota HIMPUH', desc: 'Tergabung dalam asosiasi penyelenggara Umroh untuk standar layanan dan perlindungan jamaah.' },\n      { title: 'Kontrak & Itinerary Tertulis', desc: 'Setiap jamaah menerima kontrak perjanjian dan jadwal perjalanan tertulis sebelum pelunasan.' },\n      { title: 'Kantor Fisik di Jakarta Selatan', desc: 'Kantor dapat dikunjungi langsung — bukan travel online tanpa alamat jelas.' }\n    ];\n    const faqData = [\n      { q: 'Apakah Dreammecca berizin resmi?', a: 'Ya. Dreammecca terdaftar sebagai Penyelenggara Perjalanan Ibadah Umroh (PPIU) resmi di Kementerian Agama RI dan merupakan anggota HIMPUH.' },\n      { q: 'Bagaimana sistem pembayaran dan cicilan?', a: 'Pembayaran dapat dilakukan bertahap dengan DP awal, dan pelunasan sebelum keberangkatan sesuai jadwal yang disepakati dalam kontrak.' },\n      { q: 'Apa saja yang termasuk dalam harga paket?', a: 'Harga sudah termasuk tiket pesawat, hotel, transportasi darat, manasik, perlengkapan Umroh, dan pembimbing selama perjalanan.' },\n      { q: 'Bagaimana jika ingin reschedule atau membatalkan?', a: 'Kami memiliki kebijakan reschedule dan pembatalan tertulis dalam kontrak, dijelaskan detail saat konsultasi awal.' },\n      { q: 'Apakah ada pendampingan selama di Tanah Suci?', a: 'Ya, setiap kloter didampingi pembimbing dan tim muthawif dari keberangkatan hingga kepulangan ke Indonesia.' }\n    ];\n    const faqs = faqData.map((f, i) => ({\n      q: f.q, a: f.a,\n      plusClass: 'faqplus' + (this.state.openFaq === i ? ' open' : ''),\n      answerClass: 'faqa' + (this.state.openFaq === i ? ' open' : ''),\n      onToggle: () => this.toggleFaq(i)\n    }));\n    return { waLink, displayPackages, facilities, gallery, testimonials, legalPoints, faqs };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
